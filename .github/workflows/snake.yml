name: Generate Contribution Snake

on:
  schedule:
    # a cada 12h, regenera a cobra com as contribuicoes mais recentes
    - cron: "0 */12 * * *"
  workflow_dispatch:   # permite rodar manualmente na aba Actions
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gera o SVG da cobra (tema verde-hacker)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00ff88&color_dots=0d1117,003d1a,006633,00cc66,00ff88

      - name: Publica na branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
